apiVersion: apps/v1
kind: Deployment

metadata:
  name: portal

spec:
  replicas: 2

  selector:
    matchLabels:
      app: portal

  template:
    metadata:
      labels:
        app: portal

    spec:
      containers:
      - name: portal
        image: portal:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
