apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: portal-ingress

spec:
  ingressClassName: traefik

  rules:
  - host: portal.local

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: portal-service
            port:
              number: 80
